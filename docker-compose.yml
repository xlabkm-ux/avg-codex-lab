services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: avg
      POSTGRES_PASSWORD: avg
      POSTGRES_DB: avg
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  neo4j:
    image: neo4j:5
    environment:
      NEO4J_AUTH: neo4j/password
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j-data:/data

volumes:
  postgres-data:
  neo4j-data:
